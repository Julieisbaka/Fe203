name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for manual runs), e.g. v0.0.4"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set release version
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          version="${{ steps.vars.outputs.version }}"
          name="fe203-${version}-${{ matrix.target }}"
          mkdir -p "package/${name}"
          cp "target/${{ matrix.target }}/release/fe203" "package/${name}/"
          cp README.md LICENSE "package/${name}/"
          tar -C package -czf "package/${name}.${{ matrix.archive_ext }}" "${name}"

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ steps.vars.outputs.version }}"
          $name = "fe203-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "package/$name" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/fe203.exe" "package/$name/"
          Copy-Item "README.md","LICENSE" "package/$name/"
          Compress-Archive -Path "package/$name" -DestinationPath "package/$name.${{ matrix.archive_ext }}" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: fe203-${{ matrix.target }}
          path: |
            package/*.tar.gz
            package/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Set release version
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p dist/flat
          find dist -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} dist/flat/ \;

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd dist/flat
          sha256sum *.tar.gz *.zip > SHA256SUMS.txt

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.version }}
          name: ${{ steps.vars.outputs.version }}
          files: |
            dist/flat/*.tar.gz
            dist/flat/*.zip
            dist/flat/SHA256SUMS.txt
