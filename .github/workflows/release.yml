name: release

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
  workflow_dispatch:
    inputs:
      version:
        description: "Optional release version override, e.g. v0.2.1"
        required: false
        type: string

permissions:
  contents: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.guard.outputs.should_release }}
      version: ${{ steps.vars.outputs.version }}
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set release version
        id: vars
        shell: bash
        run: |
          version_input="${{ inputs.version }}"
          if [ -n "$version_input" ]; then
            version="${version_input#v}"
          else
            version=$(sed -n 's/^version = "\([^"]*\)"$/\1/p' Cargo.toml | head -n1)
          fi
          if [ -z "$version" ]; then
            echo "error: could not determine version from Cargo.toml or workflow input" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Verify Cargo.toml and Cargo.lock versions match
        id: guard
        shell: bash
        run: |
          cargo_version="${{ steps.vars.outputs.version }}"
          lock_version=$(awk '
            $0 == "[[package]]" { in_pkg=1; name=""; version=""; next }
            in_pkg && /^name = / {
              value=$3; gsub(/"/, "", value); name=value
            }
            in_pkg && /^version = / {
              value=$3; gsub(/"/, "", value); version=value
            }
            in_pkg && name == "fe203" && version != "" { print version; exit }
          ' Cargo.lock)

          if [ -z "$lock_version" ]; then
            echo "error: could not determine fe203 package version from Cargo.lock" >&2
            exit 1
          fi

          if [ "$cargo_version" != "$lock_version" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "notice: skipping release because Cargo.toml version ($cargo_version) does not match Cargo.lock version ($lock_version)"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  tests:
    needs: preflight
    if: ${{ needs.preflight.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-tests
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run full test suite
        run: cargo test --locked --all-targets --all-features

  build:
    needs: [preflight, tests]
    if: ${{ needs.preflight.outputs.should_release == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tag="${{ needs.preflight.outputs.tag }}"
          name="fe203-${tag}-${{ matrix.target }}"
          mkdir -p "package/${name}"
          cp "target/${{ matrix.target }}/release/fe203" "package/${name}/"
          cp README.md LICENSE "package/${name}/"
          tar -C package -czf "package/${name}.${{ matrix.archive_ext }}" "${name}"

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ needs.preflight.outputs.tag }}"
          $name = "fe203-$tag-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "package/$name" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/fe203.exe" "package/$name/"
          Copy-Item "README.md","LICENSE" "package/$name/"
          Compress-Archive -Path "package/$name" -DestinationPath "package/$name.${{ matrix.archive_ext }}" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: fe203-${{ matrix.target }}
          path: |
            package/*.tar.gz
            package/*.zip

  release:
    needs: [preflight, tests, build]
    if: ${{ needs.preflight.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from changelog
        id: notes
        shell: bash
        run: |
          version="${{ needs.preflight.outputs.version }}"
          awk -v version="$version" '
            $0 ~ "^## `" version "`" { in_section=1; next }
            in_section && $0 ~ "^## `" { exit }
            in_section { print }
          ' docs/changelog.md > RELEASE_NOTES.md

          if [ ! -s RELEASE_NOTES.md ]; then
            echo "error: no changelog section found for version $version in docs/changelog.md" >&2
            exit 1
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p dist/flat
          find dist -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} dist/flat/ \;

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd dist/flat
          sha256sum *.tar.gz *.zip > SHA256SUMS.txt

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.preflight.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/flat/*.tar.gz
            dist/flat/*.zip
            dist/flat/SHA256SUMS.txt
